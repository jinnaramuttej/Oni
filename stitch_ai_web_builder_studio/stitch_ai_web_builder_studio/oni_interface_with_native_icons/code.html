<!DOCTYPE html>

<html class="dark" lang="en" style=""><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Oni Chat Interface</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:ital,wght@0,400;0,500;1,400&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          },
          colors: {
            surface: '#121317',
            'surface-dim': '#121317',
            'surface-bright': '#38393d',
            'surface-container-lowest': '#0d0e12',
            'surface-container-low': '#1a1b1f',
            'surface-container': '#1e1f23',
            'surface-container-high': '#2b2c31',
            'surface-container-highest': '#36373c',
            primary: '#ffffff',
            'on-primary': '#000000',
            secondary: '#e2e2e2',
            'on-secondary': '#1a1b1f',
            outline: '#44474e',
            'outline-variant': '#44474e',
            'text-primary': '#e3e2e6',
            'text-secondary': '#c4c6d0',
            'text-tertiary': '#8e9099',
          },
          borderRadius: {
            'none': '0',
            'sm': '0.125rem',
            DEFAULT: '0.25rem',
            'md': '0.375rem',
            'lg': '0.5rem',
            'xl': '0.75rem',
            '2xl': '1rem',
            '3xl': '1.5rem',
            'full': '9999px',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-utilities">
    body {
      background-color: theme('colors.surface');
      color: theme('colors.text-primary');
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: theme('colors.surface-container-highest');
      border-radius: 20px;
    }
    .input-focus-ring:focus-within {
      outline: 1px solid theme('colors.outline');
    }
  </style>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/></head>
<body class="h-screen w-full flex overflow-hidden font-sans antialiased text-sm">
<!-- BEGIN: Sidebar -->
<aside class="w-[260px] h-full flex flex-col bg-surface-container-lowest border-r border-surface-container-high shrink-0 transition-all duration-300">
<!-- Sidebar Header -->
<div class="h-14 flex items-center justify-between px-4 shrink-0">
<div class="flex items-center gap-2">
<span class="text-xl font-bold tracking-tight text-primary">Oni</span>
</div>
<div class="flex items-center gap-1">
<button aria-label="Search" class="p-1.5 rounded-md text-text-secondary hover:text-primary hover:bg-surface-container-low transition-colors">
<svg fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
</button>
<button aria-label="Toggle Sidebar" class="p-1.5 rounded-md text-text-secondary hover:text-primary hover:bg-surface-container-low transition-colors">
<svg fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><rect height="18" rx="2" ry="2" width="18" x="3" y="3"></rect><line x1="9" x2="9" y1="3" y2="21"></line></svg>
</button>
</div>
</div>
<!-- Sidebar Scrollable Content -->
<div class="flex-1 overflow-y-auto custom-scrollbar px-3 py-2 flex flex-col gap-6">
<!-- Primary Actions -->
<div class="flex flex-col gap-0.5">
<button class="flex items-center gap-3 px-2.5 py-2 rounded-md hover:bg-surface-container text-primary transition-colors group w-full text-left">
<span class="material-symbols-outlined text-primary" style="font-size: 20px;">add</span>
<span class="font-medium">New chat</span>
</button>
<a class="flex items-center gap-3 px-2.5 py-2 rounded-md bg-surface-container-high text-primary transition-colors w-full" href="#"><span class="material-symbols-outlined text-primary" style="font-size: 20px;">chat_bubble</span><span class="font-medium">Chats</span></a>
<a class="flex items-center gap-3 px-2.5 py-2 rounded-md hover:bg-surface-container-low text-text-secondary hover:text-primary transition-colors w-full" href="#"><span class="material-symbols-outlined text-text-secondary group-hover:text-primary" style="font-size: 20px;">folder</span><span class="font-medium">Projects</span></a>
<a class="flex items-center gap-3 px-2.5 py-2 rounded-md hover:bg-surface-container-low text-text-secondary hover:text-primary transition-colors w-full" href="#"><span class="material-symbols-outlined text-text-secondary group-hover:text-primary" style="font-size: 20px;">extension</span><span class="font-medium">Plugins</span></a>
<a class="flex items-center gap-3 px-2.5 py-2 rounded-md hover:bg-surface-container-low text-text-secondary hover:text-primary transition-colors w-full" href="#"><span class="material-symbols-outlined text-text-secondary group-hover:text-primary" style="font-size: 20px;">tune</span><span class="font-medium">Customize</span></a>
</div>
<!-- Links -->
<!-- Recents -->
<div class="flex flex-col gap-1 mt-2">
<div class="flex items-center justify-between px-2.5 py-1 text-xs font-semibold text-text-tertiary mb-1">
<span class="">Recents</span>
<button aria-label="Filter Recents" class="hover:text-primary transition-colors">
<svg fill="none" height="12" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="12" xmlns="http://www.w3.org/2000/svg"><line x1="21" x2="14" y1="4" y2="4"></line><line x1="10" x2="3" y1="4" y2="4"></line><line x1="21" x2="12" y1="12" y2="12"></line><line x1="8" x2="3" y1="12" y2="12"></line><line x1="21" x2="16" y1="20" y2="20"></line><line x1="12" x2="3" y1="20" y2="20"></line><line x1="14" x2="14" y1="2" y2="6"></line><line x1="8" x2="8" y1="10" y2="14"></line><line x1="16" x2="16" y1="18" y2="22"></line></svg>
</button>
</div>
</div>
</div>
<!-- Sidebar Footer / User Profile -->
<div class="p-3 border-t border-surface-container-high shrink-0">
<button class="w-full flex items-center justify-between p-2 rounded-lg hover:bg-surface-container transition-colors">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center text-primary font-medium shrink-0">
            U
          </div>
<div class="flex flex-col items-start text-left">
<span class="font-medium text-primary text-sm leading-tight">Uttej</span>
<span class="text-xs text-text-tertiary">Free plan</span>
</div>
</div>
<div class="flex items-center gap-1 text-text-tertiary">
<svg class="hover:text-primary transition-colors" fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" x2="12" y1="15" y2="3"></line></svg>
<svg class="ml-1" fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><mpath d="m7 15 5 5 5-5"></mpath><path d="m7 9 5-5 5 5"></path></svg>
</div>
</button>
</div>
</aside>
<!-- END: Sidebar -->
<!-- BEGIN: Main Content Area -->
<main class="flex-1 flex flex-col h-full relative bg-surface">
<!-- Top Header Bar -->
<header class="absolute top-0 left-0 right-0 p-4 flex justify-between items-center z-10 pointer-events-none">
<div class="pointer-events-auto">
<!-- Optional left aligned elements can go here if needed later -->
</div>
<div class="flex items-center gap-4 pointer-events-auto">
<div class="text-xs text-text-tertiary px-3 py-1.5 rounded-full bg-surface-container-low border border-surface-container-high hidden md:flex items-center gap-1">
<span class="">Free plan</span>
<span class="text-text-secondary px-1">·</span>
<a class="text-primary hover:underline font-medium" href="#">Upgrade</a>
</div>
<button aria-label="Profile Settings" class="w-8 h-8 rounded-full border border-surface-container-highest flex items-center justify-center text-text-secondary hover:text-primary hover:bg-surface-container-low transition-colors">
<svg fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
</button>
</div>
</header>
<!-- Center Content -->
<div class="flex-1 flex flex-col items-center justify-center px-4 md:px-8 max-w-4xl mx-auto w-full mt-[-10vh]">

<div class="flex items-center gap-3 mb-10">
<h1 class="text-4xl md:text-5xl font-serif text-primary tracking-wide">Afternoon, Uttej</h1>
</div>
<!-- Input Area -->
<div class="w-full bg-surface-container-low rounded-2xl border border-surface-container-high p-4 flex flex-col gap-3 shadow-sm input-focus-ring transition-all">
<div class="relative">
<textarea class="w-full bg-transparent border-none text-primary placeholder-text-tertiary resize-none focus:ring-0 p-0 text-base" placeholder="How can I help you today?" rows="1" style="min-height: 24px;"></textarea>
<div class="absolute right-0 top-1 w-2 h-2 rounded-full bg-teal-500"></div>
</div>
<div class="flex items-center justify-between mt-8">
<button aria-label="Add attachment" class="p-1.5 rounded-md text-text-secondary hover:text-primary hover:bg-surface-container transition-colors">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
</button>
<div class="flex items-center gap-2">
<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-text-secondary hover:bg-surface-container transition-colors text-xs font-medium">
<span class="">Oni 4.6</span>
<span class="text-text-tertiary ml-1">Medium</span>
<svg fill="none" height="12" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="12" xmlns="http://www.w3.org/2000/svg"><path d="m6 9 6 6 6-6"></path></svg>
</button>
<button aria-label="Voice input" class="p-1.5 rounded-md text-text-secondary hover:text-primary hover:bg-surface-container transition-colors">
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
</button>
<button aria-label="Settings" class="p-1.5 rounded-md text-text-secondary hover:text-primary hover:bg-surface-container transition-colors">
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg"><path d="M2 12h4l2-9 4 18 2-9h6"></path></svg>
</button>
</div>
</div>
</div>
<!-- Quick Actions -->
<div class="flex flex-wrap justify-center gap-2 mt-4">
<button class="flex items-center gap-2 px-4 py-2 rounded-xl bg-surface-container-high border border-surface-container-highest hover:bg-surface-container-highest transition-colors text-text-secondary hover:text-primary text-sm font-medium">
<svg fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
          Code
        </button>
<button class="flex items-center gap-2 px-4 py-2 rounded-xl bg-surface-container-high border border-surface-container-highest hover:bg-surface-container-highest transition-colors text-text-secondary hover:text-primary text-sm font-medium">
<svg fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><path d="M3 3v18h18"></path><path d="m19 9-5 5-4-4-3 3"></path></svg>
          Strategize
        </button>
<button class="flex items-center gap-2 px-4 py-2 rounded-xl bg-surface-container-high border border-surface-container-highest hover:bg-surface-container-highest transition-colors text-text-secondary hover:text-primary text-sm font-medium">
<svg fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg>
          Learn
        </button>
<button class="flex items-center gap-2 px-4 py-2 rounded-xl bg-surface-container-high border border-surface-container-highest hover:bg-surface-container-highest transition-colors text-text-secondary hover:text-primary text-sm font-medium">
<svg fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
          Write
        </button>
<button class="flex items-center gap-2 px-4 py-2 rounded-xl bg-surface-container-high border border-surface-container-highest hover:bg-surface-container-highest transition-colors text-text-secondary hover:text-primary text-sm font-medium">
<svg fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><path d="M17 8h1a4 4 0 1 1 0 8h-1"></path><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"></path><line x1="6" x2="6" y1="2" y2="4"></line><line x1="10" x2="10" y1="2" y2="4"></line><line x1="14" x2="14" y1="2" y2="4"></line></svg>
          Life stuff
        </button>
</div>
</div>
</main>
<!-- END: Main Content Area -->
</body></html>
