<div class="md:hidden flex items-center justify-center w-full h-full text-text-tertiary font-body-md text-body-md">

<script>
        // Simple toggle logic for demonstration (though the prompt asks for it to be visible)
        document.addEventListener('DOMContentLoaded', () => {
            const trigger = document.querySelector('#profile-container > button');
            const popup = document.getElementById('profile-popup');
            
            trigger.addEventListener('click', () => {
                const isVisible = !popup.classList.contains('opacity-0');
                if (isVisible) {
                    popup.classList.add('opacity-0', 'translate-y-2', 'pointer-events-none');
                    popup.classList.remove('opacity-100', 'translate-y-0');
                    trigger.classList.remove('bg-surface-container-high', 'border-outline-variant');
                    trigger.classList.add('hover:bg-surface-container', 'border-transparent');
                } else {
                    popup.classList.remove('opacity-0', 'translate-y-2', 'pointer-events-none');
                    popup.classList.add('opacity-100', 'translate-y-0');
                    trigger.classList.add('bg-surface-container-high', 'border-outline-variant');
                    trigger.classList.remove('hover:bg-surface-container', 'border-transparent');
                }
            });
        });
    </script>
