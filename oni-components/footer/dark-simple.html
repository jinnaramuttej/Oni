<footer class="oni-footer" style="background:#080808;border-top:1px solid #1a1a1a;padding:60px 5% 40px;color:#666;font-size:0.85rem;">
  <div style="max-width:1200px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;gap:3rem;align-items:center;">
    <div>
      <h3 style="font-family:'{{DISPLAY_FONT}}',serif;font-size:1.3rem;font-weight:700;color:#fff;margin:0 0 0.5rem;letter-spacing:-0.02em;">{{BUSINESS_NAME}}</h3>
      <p style="color:#444;margin:0;">Crafting excellence in {{LOCATION}}.</p>
    </div>
    <div style="display:flex;gap:2rem;">
      <a href="#about" style="color:#666;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#666'">About</a>
      <a href="#services" style="color:#666;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#666'">Services</a>
      <a href="#testimonials" style="color:#666;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#666'">Reviews</a>
      <a href="#contact" style="color:#666;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#666'">Contact</a>
    </div>
  </div>
  <div style="max-width:1200px;margin:40px auto 0;padding-top:20px;border-top:1px solid #111;display:flex;flex-wrap:wrap;justify-content:space-between;gap:1.5rem;align-items:center;color:#444;font-size:0.75rem;">
    <p style="margin:0;">&copy; 2026 {{BUSINESS_NAME}}. All rights reserved.</p>
    <p style="margin:0;">Designed with passion.</p>
  </div>
</footer>
