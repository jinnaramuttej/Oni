<footer class="oni-footer" style="background:#fff;border-top:1px solid #eaeaea;padding:60px 5% 40px;color:#777;font-size:0.85rem;">
  <div style="max-width:1200px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;gap:3rem;align-items:center;">
    <div>
      <h3 style="font-family:'{{DISPLAY_FONT}}',sans-serif;font-size:1.2rem;font-weight:800;color:#111;margin:0 0 0.5rem;letter-spacing:-0.03em;">{{BUSINESS_NAME}}</h3>
      <p style="color:#999;margin:0;">Premium service in {{LOCATION}}.</p>
    </div>
    <div style="display:flex;gap:2rem;">
      <a href="#services" style="color:#777;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='#111'" onmouseout="this.style.color='#777'">Services</a>
      <a href="#about" style="color:#777;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='#111'" onmouseout="this.style.color='#777'">About</a>
      <a href="#testimonials" style="color:#777;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='#111'" onmouseout="this.style.color='#777'">Reviews</a>
      <a href="#contact" style="color:#777;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='#111'" onmouseout="this.style.color='#777'">Contact</a>
    </div>
  </div>
  <div style="max-width:1200px;margin:40px auto 0;padding-top:20px;border-top:1px solid #f0f0f0;display:flex;flex-wrap:wrap;justify-content:space-between;gap:1.5rem;align-items:center;color:#aaa;font-size:0.75rem;">
    <p style="margin:0;">&copy; 2026 {{BUSINESS_NAME}}. All rights reserved.</p>
    <p style="margin:0;">Quality & Integrity.</p>
  </div>
</footer>
