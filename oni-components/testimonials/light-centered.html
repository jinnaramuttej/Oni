<section class="oni-testimonials" id="testimonials" style="background:#fff;padding:100px 5%;">

    <h2 style="font-family:'{{DISPLAY_FONT}}',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;color:#111;margin:0 0 4rem;letter-spacing:-0.03em;">Loved by our clients</h2>

    <div style="margin-bottom:4rem;">
      <p style="font-family:'{{DISPLAY_FONT}}',serif;font-size:clamp(1.2rem,2.5vw,1.6rem);font-style:italic;color:#111;line-height:1.6;margin:0 0 2rem;">"{{BUSINESS_NAME}} has completely transformed my experience. I never imagined results this good were possible. Five stars isn't enough."</p>

        <div style="text-align:left;">
          <p style="font-size:0.9rem;font-weight:700;color:#111;margin:0;">Sana Kapoor</p>
          <p style="font-size:0.8rem;color:#999;margin:0;">{{LOCATION}} — Verified Client</p>
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;padding:2.5rem 0;border-top:1px solid #eee;border-bottom:1px solid #eee;">
      <div><p style="font-size:2.2rem;font-weight:800;color:{{PRIMARY_COLOR}};margin:0;">4.9★</p><p style="color:#888;font-size:0.85rem;margin:0.3rem 0 0;">Average rating</p></div>
      <div><p style="font-size:2.2rem;font-weight:800;color:#111;margin:0;">500+</p><p style="color:#888;font-size:0.85rem;margin:0.3rem 0 0;">Happy clients</p></div>
      <div><p style="font-size:2.2rem;font-weight:800;color:#111;margin:0;">98%</p><p style="color:#888;font-size:0.85rem;margin:0.3rem 0 0;">Would recommend</p></div>
    </div>
  </div>
