<section class="oni-hero" id="hero" style="min-height:100vh;background:#fff;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:100px 8% 60px;gap:5rem;max-width:1300px;margin:0 auto;">
  <div>
    <p style="color:{{PRIMARY_COLOR}};font-size:0.78rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;margin:0 0 1.2rem;">{{LOCATION}}</p>
    <h1 style="font-family:'{{DISPLAY_FONT}}',serif;font-size:clamp(2.8rem,5vw,4.5rem);font-weight:800;line-height:1.05;color:#0a0a0a;margin:0 0 1.5rem;letter-spacing:-0.03em;">{{TAGLINE}}</h1>
    <p style="color:#555;font-size:1.05rem;line-height:1.8;margin:0 0 2.5rem;max-width:440px;">{{BUSINESS_NAME}} — where every detail is crafted with intention. Book your appointment today and experience the difference.</p>
    <div style="display:flex;gap:1rem;flex-wrap:wrap;">
      <a href="#contact" style="background:{{PRIMARY_COLOR}};color:#fff;padding:0.95rem 2.2rem;border-radius:50px;font-size:0.88rem;font-weight:700;text-decoration:none;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 4px 20px {{PRIMARY_COLOR}}55;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">{{CTA_TEXT}}</a>
      <a href="#services" style="color:#111;padding:0.95rem 2.2rem;border-radius:50px;font-size:0.88rem;font-weight:600;text-decoration:none;border:1.5px solid #e0e0e0;transition:border-color 0.2s;" onmouseover="this.style.borderColor='#111'" onmouseout="this.style.borderColor='#e0e0e0'">See Services</a>
    </div>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;">
    <div style="width:100%;aspect-ratio:4/5;background:linear-gradient(145deg,{{PRIMARY_COLOR}}15,{{SECONDARY_COLOR}}25);border-radius:2rem;display:flex;align-items:center;justify-content:center;font-size:4rem;">✨</div>
  </div>
</section>
