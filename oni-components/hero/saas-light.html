<section class="oni-hero" id="hero" style="min-height:100vh;background:linear-gradient(160deg,#f8f9ff 0%,#eef2ff 100%);display:flex;align-items:center;padding:100px 8% 60px;position:relative;overflow:hidden;">
  <!-- Grid pattern -->
  <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;"></div>
  <div style="max-width:1200px;margin:0 auto;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;position:relative;z-index:2;">
    <div>
      <div style="display:inline-block;background:{{PRIMARY_COLOR}}18;color:{{PRIMARY_COLOR}};font-size:0.72rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:0.35rem 0.9rem;border-radius:50px;margin-bottom:1.5rem;">{{TAGLINE}}</div>
      <h1 style="font-family:'{{DISPLAY_FONT}}',sans-serif;font-size:clamp(2.5rem,4.5vw,4rem);font-weight:800;line-height:1.1;color:#0a0a1a;margin:0 0 1.5rem;letter-spacing:-0.04em;">{{BUSINESS_NAME}}<br><span style="color:{{PRIMARY_COLOR}};">for modern teams</span></h1>
      <p style="color:#555;font-size:1.05rem;line-height:1.8;margin:0 0 2.5rem;max-width:440px;">Streamline your workflow, boost productivity, and scale faster. Trusted by teams in {{LOCATION}} and beyond.</p>
      <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2.5rem;">
        <a href="#contact" style="background:{{PRIMARY_COLOR}};color:#fff;padding:0.95rem 2rem;border-radius:8px;font-size:0.88rem;font-weight:700;text-decoration:none;transition:all 0.2s;box-shadow:0 4px 16px {{PRIMARY_COLOR}}44;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">{{CTA_TEXT}} →</a>
        <a href="#features" style="background:#fff;color:#333;padding:0.95rem 2rem;border-radius:8px;font-size:0.88rem;font-weight:600;text-decoration:none;border:1.5px solid #e8e8e8;transition:border-color 0.2s;" onmouseover="this.style.borderColor='#ccc'" onmouseout="this.style.borderColor='#e8e8e8'">See how it works</a>
      </div>
      <div style="display:flex;align-items:center;gap:1.5rem;">
        <div style="display:flex;"><span style="width:30px;height:30px;border-radius:50%;background:{{PRIMARY_COLOR}}33;border:2px solid #fff;display:inline-block;margin-right:-8px;"></span><span style="width:30px;height:30px;border-radius:50%;background:{{SECONDARY_COLOR}}33;border:2px solid #fff;display:inline-block;margin-right:-8px;"></span><span style="width:30px;height:30px;border-radius:50%;background:#eee;border:2px solid #fff;display:inline-block;"></span></div>
        <p style="color:#777;font-size:0.85rem;margin:0;"><strong style="color:#111;">500+</strong> teams already onboard</p>
      </div>
    </div>
    <div style="background:{{PRIMARY_COLOR}}10;border:1px solid {{PRIMARY_COLOR}}20;border-radius:1.5rem;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:5rem;">⚡</div>
  </div>
</section>
