<section class="oni-hero" id="hero" style="min-height:100vh;background:linear-gradient(180deg,#0a0600 0%,#1a0e02 60%,#0d0900 100%);display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;padding:120px 5% 100px;">
  <!-- Decorative circles -->
  <div style="position:absolute;top:-100px;right:-100px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,{{PRIMARY_COLOR}}18 0%,transparent 70%);pointer-events:none;"></div>
  <div style="position:absolute;bottom:-80px;left:-80px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,{{SECONDARY_COLOR}}15 0%,transparent 70%);pointer-events:none;"></div>
  <div style="position:relative;z-index:2;max-width:800px;">
    <div style="display:inline-flex;align-items:center;gap:0.6rem;background:{{PRIMARY_COLOR}}22;border:1px solid {{PRIMARY_COLOR}}44;border-radius:50px;padding:0.4rem 1rem;margin-bottom:2rem;">
      <span style="color:{{PRIMARY_COLOR}};font-size:0.75rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;">{{LOCATION}}</span>
    </div>
    <h1 style="font-family:'{{DISPLAY_FONT}}',serif;font-size:clamp(3rem,7vw,6.5rem);font-weight:800;line-height:1;color:#fff;margin:0 0 1rem;letter-spacing:-0.03em;">{{BUSINESS_NAME}}</h1>
    <p style="font-family:'{{DISPLAY_FONT}}',serif;font-size:clamp(1rem,2.5vw,1.4rem);color:{{PRIMARY_COLOR}};font-style:italic;margin:0 0 1.5rem;font-weight:400;">{{TAGLINE}}</p>
    <p style="color:rgba(255,255,255,0.5);font-size:1rem;line-height:1.8;max-width:500px;margin:0 auto 3rem;">An unforgettable dining experience in the heart of {{LOCATION}}. Reserve your table today.</p>
    <a href="#contact" style="display:inline-block;background:{{PRIMARY_COLOR}};color:#fff;padding:1.1rem 3rem;border-radius:3px;font-size:0.88rem;font-weight:700;text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;transition:all 0.2s;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 30px {{PRIMARY_COLOR}}55'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='none'">Reserve a Table</a>
  </div>
</section>
