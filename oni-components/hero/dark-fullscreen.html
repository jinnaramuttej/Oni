<section class="oni-hero" id="hero" style="min-height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a1a 50%,#0d0d0d 100%);display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;padding:120px 5% 80px;">
  <!-- Background accent orb -->
  <div style="position:absolute;top:20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,{{PRIMARY_COLOR}}22 0%,transparent 70%);pointer-events:none;"></div>
  <div style="position:relative;z-index:2;max-width:900px;">
    <p style="color:{{PRIMARY_COLOR}};font-size:0.8rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;margin:0 0 1.5rem;">{{TAGLINE}}</p>
    <h1 style="font-family:'{{DISPLAY_FONT}}',serif;font-size:clamp(3.5rem,8vw,7rem);font-weight:800;line-height:0.95;color:#fff;margin:0 0 1.5rem;letter-spacing:-0.04em;">{{BUSINESS_NAME}}</h1>
    <p style="color:rgba(255,255,255,0.55);font-size:clamp(1rem,2vw,1.2rem);line-height:1.7;max-width:560px;margin:0 auto 3rem;">Premium quality. Exceptional results. Trusted by thousands across {{LOCATION}}.</p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <a href="#contact" style="background:{{PRIMARY_COLOR}};color:#fff;padding:1rem 2.5rem;border-radius:4px;font-size:0.9rem;font-weight:700;text-decoration:none;letter-spacing:0.04em;transition:opacity 0.2s;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">{{CTA_TEXT}}</a>
      <a href="#services" style="background:transparent;color:#fff;padding:1rem 2.5rem;border-radius:4px;font-size:0.9rem;font-weight:600;text-decoration:none;border:1.5px solid rgba(255,255,255,0.25);transition:border-color 0.2s;" onmouseover="this.style.borderColor='rgba(255,255,255,0.6)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.25)'">Our Services</a>
    </div>
  </div>
</section>
