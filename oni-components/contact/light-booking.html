<section class="oni-contact" id="contact" style="background:#fafafa;padding:100px 5%;">
  <div style="max-width:600px;margin:0 auto;text-align:center;">
    <p style="color:{{PRIMARY_COLOR}};font-size:0.78rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;margin:0 0 0.75rem;">Book Appointment</p>
    <h2 style="font-family:'{{DISPLAY_FONT}}',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;color:#111;margin:0 0 1rem;letter-spacing:-0.03em;">Let's get you booked</h2>
    <p style="color:#777;font-size:0.95rem;line-height:1.7;margin:0 0 2.5rem;">Fill in your details and the {{BUSINESS_NAME}} team in {{LOCATION}} will confirm your appointment within 2 hours.</p>
    <form style="display:flex;flex-direction:column;gap:1rem;text-align:left;" onsubmit="event.preventDefault();alert('Booking received! We will confirm shortly.');this.reset();">
      <input type="text" placeholder="Your name" style="width:100%;background:#fff;border:1.5px solid #e5e5e5;border-radius:8px;padding:0.85rem 1.1rem;color:#111;font-size:0.9rem;outline:none;box-sizing:border-box;transition:border-color 0.2s;" onfocus="this.style.borderColor='{{PRIMARY_COLOR}}'" onblur="this.style.borderColor='#e5e5e5'">
      <input type="tel" placeholder="Phone number" style="width:100%;background:#fff;border:1.5px solid #e5e5e5;border-radius:8px;padding:0.85rem 1.1rem;color:#111;font-size:0.9rem;outline:none;box-sizing:border-box;transition:border-color 0.2s;" onfocus="this.style.borderColor='{{PRIMARY_COLOR}}'" onblur="this.style.borderColor='#e5e5e5'">
      <select style="width:100%;background:#fff;border:1.5px solid #e5e5e5;border-radius:8px;padding:0.85rem 1.1rem;color:#555;font-size:0.9rem;outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='{{PRIMARY_COLOR}}'" onblur="this.style.borderColor='#e5e5e5'"><option>Select a service</option><option>Starter Package</option><option>Premium Package</option></select>
      <input type="text" placeholder="Preferred date & time" style="width:100%;background:#fff;border:1.5px solid #e5e5e5;border-radius:8px;padding:0.85rem 1.1rem;color:#111;font-size:0.9rem;outline:none;box-sizing:border-box;transition:border-color 0.2s;" onfocus="this.style.borderColor='{{PRIMARY_COLOR}}'" onblur="this.style.borderColor='#e5e5e5'">
      <button type="submit" style="background:{{PRIMARY_COLOR}};color:#fff;border:none;padding:1rem;border-radius:8px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px {{PRIMARY_COLOR}}44;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">Confirm Booking</button>
    </form>
    <div style="display:flex;align-items:center;justify-content:center;gap:2rem;margin-top:2.5rem;padding-top:2rem;border-top:1px solid #eee;">
      <a href="tel:{{PHONE}}" style="color:#666;font-size:0.85rem;text-decoration:none;display:flex;align-items:center;gap:0.4rem;">📞 {{PHONE}}</a>
      <a href="mailto:{{EMAIL}}" style="color:#666;font-size:0.85rem;text-decoration:none;display:flex;align-items:center;gap:0.4rem;">✉️ {{EMAIL}}</a>
    </div>
  </div>
</section>
