<nav class="oni-navbar" style="position:fixed;top:0;left:0;right:0;z-index:100;background:transparent;padding:0 5%;transition:background 0.3s,box-shadow 0.3s;" id="oni-nav">
  <div style="max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:80px;">
    <a href="#" style="font-family:'{{DISPLAY_FONT}}',serif;font-size:1.6rem;font-weight:700;color:#fff;text-decoration:none;letter-spacing:-0.02em;">{{BUSINESS_NAME}}</a>
    <div style="display:flex;align-items:center;gap:3rem;">
      <a href="#menu" style="color:rgba(255,255,255,0.8);font-size:0.9rem;text-decoration:none;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">Menu</a>
      <a href="#about" style="color:rgba(255,255,255,0.8);font-size:0.9rem;text-decoration:none;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">About</a>
      <a href="#location" style="color:rgba(255,255,255,0.8);font-size:0.9rem;text-decoration:none;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">Location</a>
      <a href="#contact" style="border:1.5px solid rgba(255,255,255,0.5);color:#fff;padding:0.6rem 1.6rem;border-radius:2px;font-size:0.8rem;font-weight:600;text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.2s;" onmouseover="this.style.background='#fff';this.style.color='#111'" onmouseout="this.style.background='transparent';this.style.color='#fff'">Reserve</a>

  </div>
  <script>
    (function(){
      var nav = document.getElementById('oni-nav');
      window.addEventListener('scroll', function(){
        if(window.scrollY > 60){ nav.style.background='rgba(10,8,6,0.95)'; nav.style.boxShadow='0 1px 20px rgba(0,0,0,0.4)'; }
        else{ nav.style.background='transparent'; nav.style.boxShadow='none'; }

    })();
