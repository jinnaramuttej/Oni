<section class="oni-cta" style="background:linear-gradient(135deg, #111 0%, #1a1a1a 100%);padding:80px 5%;text-align:center;position:relative;overflow:hidden;border-top:1px solid rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.05);">
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;background:radial-gradient(circle, {{PRIMARY_COLOR}}15 0%, transparent 60%);pointer-events:none;z-index:1;"></div>
  <div style="position:relative;z-index:2;max-width:700px;margin:0 auto;">
    <h2 style="font-family:'{{DISPLAY_FONT}}',serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;color:#fff;margin:0 0 1rem;letter-spacing:-0.02em;">Take the first step with {{BUSINESS_NAME}}</h2>
    <p style="color:#888;font-size:1rem;line-height:1.7;margin:0 0 2.5rem;max-width:500px;margin-left:auto;margin-right:auto;">Experience the exceptional quality and customer-first service that sets us apart in {{LOCATION}}.</p>
    <a href="#contact" style="display:inline-block;background:{{PRIMARY_COLOR}};color:#fff;padding:1rem 2.5rem;border-radius:4px;font-size:0.9rem;font-weight:700;text-decoration:none;transition:opacity 0.2s;box-shadow:0 10px 25px {{PRIMARY_COLOR}}33;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">{{CTA_TEXT}}</a>
  </div>
</section>
