<section class="oni-cta" style="background:#f9fafb;padding:80px 5%;text-align:center;border-top:1px solid #eaeaea;border-bottom:1px solid #eaeaea;">
  <div style="max-width:700px;margin:0 auto;position:relative;z-index:2;">
    <h2 style="font-family:'{{DISPLAY_FONT}}',sans-serif;font-size:clamp(1.8rem,4vw,2.5rem);font-weight:800;color:#111;margin:0 0 1rem;letter-spacing:-0.03em;">Ready to transform your day?</h2>
    <p style="color:#555;font-size:1rem;line-height:1.7;margin:0 0 2.5rem;max-width:480px;margin-left:auto;margin-right:auto;">Book your session at {{BUSINESS_NAME}} and experience professional care in {{LOCATION}}.</p>
    <a href="#contact" style="display:inline-block;background:{{PRIMARY_COLOR}};color:#fff;padding:0.95rem 2.2rem;border-radius:50px;font-size:0.88rem;font-weight:700;text-decoration:none;transition:transform 0.2s, box-shadow 0.2s;box-shadow:0 8px 25px {{PRIMARY_COLOR}}44;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">{{CTA_TEXT}}</a>
